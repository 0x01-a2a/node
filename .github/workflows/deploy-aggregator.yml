name: Deploy Aggregator

# Builds zerox1-aggregator independently and uploads the binary as a workflow
# artifact. Production deploy to the Hetzner genesis node is manual today
# (scp + systemctl restart). Triggered on pushes to main that touch aggregator
# source, or via workflow_dispatch.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'crates/zerox1-aggregator/**'
      - 'crates/zerox1-common/**'
      - 'Cargo.toml'
      - 'Cargo.lock'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build aggregator
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-registry-${{ runner.os }}-

      - name: Build zerox1-aggregator
        run: cargo build --release -p zerox1-aggregator --features zerox1-aggregator/data-bounty,zerox1-aggregator/pilot
        env:
          CARGO_TERM_COLOR: always

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zerox1-aggregator
          path: target/release/zerox1-aggregator
          if-no-files-found: error
          retention-days: 7
